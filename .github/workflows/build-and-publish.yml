name: Publish Release to R2

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Download NSIS installer from Release
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          FILE_NAME="Derivercrabify_${VERSION}_x64-setup.exe"
          curl -sL -o "$FILE_NAME" \
            "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$FILE_NAME"
          echo "FILE_NAME=$FILE_NAME" >> $GITHUB_ENV

      - name: Upload to R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          aws s3 cp "$FILE_NAME" "s3://$R2_BUCKET/derivercrabify/app/$FILE_NAME" \
            --endpoint-url "$R2_ENDPOINT"

      - name: Trigger Cloudflare Pages deploy hook
        run: curl -X POST -s "${{ secrets.CF_PAGES_DEPLOY_HOOK }}"
