name: Update Locale Pack

on:
  schedule:
    - cron: '30 19 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download pre-built locale-updater
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download locale-updater --pattern 'locale-updater' --output /usr/local/bin/locale-updater
          chmod +x /usr/local/bin/locale-updater

      - name: Run locale-updater
        env:
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
        run: locale-updater
